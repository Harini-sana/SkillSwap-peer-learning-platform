   ROOT VARIABLES (SAME AS CONNECT)
========================================================= */

========================================================= */

.message {

  border-radius: 16px;
  font-size: 14px;

.message.received {

  border: 1px solid var(--violet-100);
}

}

.message.sent {

/* INPUT */

  background: var(--white);

  gap: 12px;
  flex-shrink: 0;   /* 🔥 prevents being squashed */

.typing-indicator span:nth-child(2) {

@keyframes typingBounce {
  0%,
  80%,

async function sendExchangeLink(exchangeId) {

    method: "POST",

  });

}
/* =========================
   CSRF TOKEN
========================= */
function getCSRFToken() {
  const name = "csrftoken";
  const cookies = document.cookie.split(";");
  for (let c of cookies) {
    const cookie = c.trim();
    if (cookie.startsWith(name + "=")) {
      return decodeURIComponent(cookie.substring(name.length + 1));
    }
  }
  return null;
}

      method: "GET",
      credentials: "include",
      headers: {
        "Content-Type": "application/json"

    });

    if (!res.ok) {
      throw new Error(`Server responded with ${res.status}`);
    }

    // Safety check
    if (!Array.isArray(data)) {
      throw new Error("Invalid response format");

    conversations = data;

    if (conversations.length === 0) {

document.addEventListener("DOMContentLoaded", async () => {

          sendExchangeLink(shareExchangeId);
          localStorage.removeItem("shareExchangeId");
        }, 500);
      }

    localStorage.removeItem("openChatUser");
  }
});

         style="display:block;text-decoration:none;color:inherit">

        <div style="font-size:12px;opacity:.7;margin-top:4px">
          Tap to open exchange
        </div>
      </a>
      <small style="opacity:.6;font-size:11px">
        ${time}
      </small>
    `;
  }

  // 🔥 Shared Post
  else if (data.post_id) {
    div.innerHTML = `
      <a href="explore.html?post_id=${data.post_id}"
         class="shared-post"
         style="display:block;text-decoration:none;color:inherit">
        📎 <strong>View Shared Post</strong>
        <div style="font-size:12px;opacity:.7;margin-top:4px">
          Click to open post
        </div>
      </a>
      <small style="opacity:.6;font-size:11px">
        ${time}
      </small>
    `;
  }

  // Normal message
  else {
    div.innerHTML = `<div>${data.message}</div>`;
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
};
  socket.onclose = () => {
    console.log("WebSocket closed");
  };

  socket.onerror = err => {
    console.error("WebSocket error:", err);
  };
}


async function acceptRequest(fromUserId, btn){

const user = JSON.parse(localStorage.getItem("skillswap_state")).user;

/* disable buttons instantly */
btn.parentElement.innerHTML = "<span style='color:#5CB8A6;font-weight:600'>Request Accepted</span>";

/* update request status */
await fetch("http://127.0.0.1:8000/api/connect/accept/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
from_user_id:fromUserId,
to_user_id:user.id
})
});

/* notify sender */
await fetch("http://127.0.0.1:8000/api/messages/system/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
sender_id:user.id,
receiver_id:fromUserId,
text:`Yeah!! Your skill exchange request was accepted.`
})
});

}
